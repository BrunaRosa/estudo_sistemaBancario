name: GitLab CI Workflow - GitHub Actions

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}
  schedule:
    - cron: '40 00 * * *'

jobs:
  test:
    name: Run unit tests and upload report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and generate report
        run: npm run test:report

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-results
          retention-days: 7
